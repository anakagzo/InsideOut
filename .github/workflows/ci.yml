name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend test suite
        run: pytest -q

  frontend-checks:
    name: Frontend lint, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.9.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --include=optional --no-audit --no-fund

      - name: Verify frontend toolchain
        run: |
          node -v
          npm -v
          npm ls vite vitest eslint --depth=0
          node -e "for (const pkg of ['vite','rollup','@swc/core']) { try { console.log(pkg + ' -> ' + require.resolve(pkg)); } catch (err) { console.error('Missing package:', pkg); console.error(err.message); process.exitCode = 1; } }"

      - name: Ensure Linux native build deps
        if: runner.os == 'Linux'
        run: |
          node -e "const pkgs=['@rollup/rollup-linux-x64-gnu','@swc/core-linux-x64-gnu']; const missing=pkgs.filter((pkg)=>{ try { require.resolve(pkg); return false; } catch { return true; } }); if (missing.length === 0) { console.log('Native deps already present.'); process.exit(0); } console.log('Missing optional native deps:', missing.join(', ')); process.exit(2);" || npm install --no-save --no-audit --no-fund @rollup/rollup-linux-x64-gnu @swc/core-linux-x64-gnu
          node -e "for (const pkg of ['@rollup/rollup-linux-x64-gnu','@swc/core-linux-x64-gnu']) { console.log(pkg + ' -> ' + require.resolve(pkg)); }"

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests
        run: npm run test

      - name: Build frontend
        run: npm run build -- --debug
