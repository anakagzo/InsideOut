name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-to-digitalocean:
    name: Deploy to DigitalOcean App Platform
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') }}
    runs-on: ubuntu-latest
    env:
      GITHUB_REPOSITORY: ${{ github.repository }}
      PORT: '$PORT'
      DATABASE_URL: ${{ secrets.DATABASE_URL_POOLER || secrets.DATABASE_URL }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      ONBOARDING_TOKEN_SECRET: ${{ secrets.ONBOARDING_TOKEN_SECRET }}
      FRONTEND_BASE_URL: ${{ secrets.FRONTEND_BASE_URL }}
      CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      MEDIA_PUBLIC_BASE_URL: ${{ secrets.MEDIA_PUBLIC_BASE_URL }}
      MEDIA_BUCKET_NAME: ${{ secrets.MEDIA_BUCKET_NAME }}
      MEDIA_S3_REGION: ${{ secrets.MEDIA_S3_REGION }}
      MEDIA_S3_ENDPOINT_URL: ${{ secrets.MEDIA_S3_ENDPOINT_URL }}
      MEDIA_S3_ACCESS_KEY: ${{ secrets.MEDIA_S3_ACCESS_KEY }}
      MEDIA_S3_SECRET_KEY: ${{ secrets.MEDIA_S3_SECRET_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      ZOOM_CLIENT_ID: ${{ secrets.ZOOM_CLIENT_ID }}
      ZOOM_CLIENT_SECRET: ${{ secrets.ZOOM_CLIENT_SECRET }}
      ZOOM_ACCOUNT_ID: ${{ secrets.ZOOM_ACCOUNT_ID }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.workflow_run.head_sha }}

      - name: Validate required deploy secrets
        run: |
          required=(
            DATABASE_URL
            JWT_SECRET_KEY
            ONBOARDING_TOKEN_SECRET
            FRONTEND_BASE_URL
            CORS_ORIGINS
            VITE_API_BASE_URL
          )

          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: ${key}" >&2
              exit 1
            fi
          done

      - name: Validate DATABASE_URL network reachability
        run: |
          db_host=$(python - <<'PY'
          import os
          from urllib.parse import urlparse

          print(urlparse(os.environ["DATABASE_URL"]).hostname or "")
          PY
          )

          if [ -z "$db_host" ]; then
            echo "Could not parse DB host from DATABASE_URL" >&2
            exit 1
          fi

          if ! getent ahostsv4 "$db_host" >/dev/null; then
            echo "DATABASE_URL host '$db_host' has no IPv4 address from this runner." >&2
            echo "For Supabase, use the Session/Transaction Pooler URL and set secret DATABASE_URL_POOLER." >&2
            echo "Pooler hosts look like: aws-0-<region>.pooler.supabase.com" >&2
            exit 1
          fi

      - name: Deploy app spec
        uses: digitalocean/app_action/deploy@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          app_spec_location: .do/app.yaml
          print_build_logs: true
          print_deploy_logs: true

      - name: Post-deploy smoke checks
        run: |
          set -euo pipefail

          api_base_url="${VITE_API_BASE_URL%/}"
          frontend_url="${FRONTEND_BASE_URL%/}"
          api_health_url="${api_base_url}/health"

          max_attempts=20
          sleep_seconds=15
          api_ok=0
          frontend_ok=0

          echo "API health URL: ${api_health_url}"
          echo "Frontend URL: ${frontend_url}"

          for attempt in $(seq 1 "$max_attempts"); do
            echo "Smoke check attempt ${attempt}/${max_attempts}"

            api_status=$(curl -sS -o /tmp/api-health.json -w "%{http_code}" --max-time 20 "${api_health_url}" || true)
            frontend_status=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 20 "${frontend_url}" || true)

            if [ "$api_status" = "200" ] && grep -Eiq '"status"[[:space:]]*:[[:space:]]*"ok"' /tmp/api-health.json; then
              api_ok=1
            fi

            if [ "$frontend_status" = "200" ] || [ "$frontend_status" = "301" ] || [ "$frontend_status" = "302" ] || [ "$frontend_status" = "307" ] || [ "$frontend_status" = "308" ]; then
              frontend_ok=1
            fi

            echo "API status: ${api_status}, frontend status: ${frontend_status}"

            if [ "$api_ok" -eq 1 ] && [ "$frontend_ok" -eq 1 ]; then
              echo "Post-deploy smoke checks passed."
              exit 0
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              sleep "$sleep_seconds"
            fi
          done

          echo "Post-deploy smoke checks failed after ${max_attempts} attempts." >&2
          echo "Last API response body:" >&2
          cat /tmp/api-health.json >&2 || true
          exit 1
